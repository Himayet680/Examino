<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sami's Blessings</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c060;
  --gold2: #c8922a;
  --gold-glow: rgba(240,192,96,0.55);
  --jade: #00e88a;
  --crimson: #ff3b3b;
  --void: #04040d;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; min-height:100vh; background:var(--void); overflow-x:hidden; }

#bgCanvas {
  position:fixed; inset:0; width:100%; height:100%;
  z-index:0; pointer-events:none;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.04; pointer-events:none; z-index:9;
}

/* ══════════════════════════════
   MAIN PAGE
══════════════════════════════ */
#mainPage {
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 24px 80px;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#mainPage.exit {
  opacity:0;
  transform: scale(1.06);
  pointer-events:none;
}

.badge {
  font-family:'Cormorant Garamond',serif;
  font-size:11px; font-weight:300;
  letter-spacing:0.35em; text-transform:uppercase;
  color:var(--gold); opacity:0.6; margin-bottom:18px;
  animation:fadeDown 1.2s ease both;
}

.title-wrap { text-align:center; margin-bottom:8px; animation:fadeDown 1s ease 0.15s both; }

.title-frak {
  font-family:'UnifrakturMaguntia',cursive;
  font-size:clamp(54px,11vw,96px);
  color:var(--gold); line-height:1;
  text-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(240,192,96,0.25),0 4px 20px rgba(0,0,0,0.9);
  filter:drop-shadow(0 0 28px rgba(240,192,96,0.45));
  display:block;
}

.title-sub {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(13px,2.5vw,18px); font-weight:300;
  color:rgba(240,192,96,0.45); letter-spacing:0.22em; margin-top:6px; display:block;
}

.orn { width:380px; max-width:90vw; display:block; margin:28px auto; opacity:0.45; animation:fadeDown 1s ease 0.3s both; }

.question {
  font-family:'Playfair Display',serif;
  font-size:clamp(15px,2.8vw,21px);
  color:rgba(255,255,255,0.75); text-align:center;
  letter-spacing:0.04em; margin-bottom:48px;
  animation:fadeDown 1s ease 0.45s both; max-width:500px;
}

.btn-row {
  display:flex; gap:30px; justify-content:center; flex-wrap:wrap;
  animation:fadeDown 1s ease 0.6s both; margin-bottom:14px;
}

.btn {
  position:relative; font-family:'Playfair Display',serif;
  font-size:15px; font-weight:700; letter-spacing:0.06em;
  padding:0; width:224px; height:210px;
  border:none; border-radius:22px; cursor:pointer;
  overflow:hidden; text-align:center;
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1), box-shadow 0.35s ease;
}

.btn-inner {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; padding:20px; gap:10px;
}

.btn-number {
  font-family:'Cormorant Garamond',serif; font-size:11px; font-weight:300;
  letter-spacing:0.3em; text-transform:uppercase; opacity:0.65;
}

.btn-emoji {
  font-size:54px; display:block;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,0.5));
  transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
}
.btn:hover .btn-emoji { transform:scale(1.28) rotate(-6deg); }
.btn-label { font-size:16px; line-height:1.2; }

.peace {
  background:linear-gradient(145deg,#041a0e 0%,#073d20 45%,#0a5a30 100%);
  border:1px solid rgba(0,232,138,0.28); color:#afffda;
  box-shadow:0 0 0 1px rgba(0,232,138,0.08),0 12px 50px rgba(0,232,138,0.18),inset 0 1px 0 rgba(255,255,255,0.06);
}
.peace:hover {
  transform:translateY(-10px) scale(1.04);
  box-shadow:0 0 0 1px rgba(0,232,138,0.45),0 24px 80px rgba(0,232,138,0.5),inset 0 1px 0 rgba(255,255,255,0.1);
}

.naughty {
  background:linear-gradient(145deg,#190303 0%,#450808 45%,#6b0e0e 100%);
  border:1px solid rgba(255,59,59,0.28); color:#ffc8c8;
  box-shadow:0 0 0 1px rgba(255,59,59,0.08),0 12px 50px rgba(255,59,59,0.18),inset 0 1px 0 rgba(255,255,255,0.05);
}
.naughty:hover {
  transform:translateY(-10px) scale(1.04);
  box-shadow:0 0 0 1px rgba(255,59,59,0.45),0 24px 80px rgba(255,59,59,0.55),inset 0 1px 0 rgba(255,255,255,0.08);
}

.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,0.06) 40%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0.06) 60%,transparent 100%);
  transform:translateX(-130%); transition:transform 0.7s ease; z-index:3;
}
.btn:hover::before { transform:translateX(130%); }

.btn-particles { position:absolute; inset:0; pointer-events:none; z-index:1; overflow:hidden; border-radius:22px; }

.footer {
  margin-top:56px; font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:12px; letter-spacing:0.2em; color:rgba(240,192,96,0.22);
  text-align:center; z-index:10; position:relative;
}

.rune {
  position:fixed; font-family:'UnifrakturMaguntia',cursive;
  color:var(--gold); pointer-events:none; z-index:1;
  animation:floatRune linear infinite; opacity:0;
}
@keyframes floatRune {
  0%   { transform:translateY(100vh) rotate(0deg);   opacity:0; }
  5%   { opacity:0.12; }
  95%  { opacity:0.06; }
  100% { transform:translateY(-140px) rotate(360deg); opacity:0; }
}

/* ══════════════════════════════
   FULLSCREEN VIDEO PAGE
══════════════════════════════ */
#videoPage {
  position:fixed; inset:0; z-index:100;
  background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition: opacity 0.7s ease;
}
#videoPage.active {
  opacity:1; pointer-events:all;
}

/* Ripple/flash overlay on enter */
#videoPage .flash {
  position:absolute; inset:0; pointer-events:none; z-index:200;
  animation: flashIn 0.7s ease forwards;
}
@keyframes flashIn {
  0%   { opacity:1; }
  100% { opacity:0; }
}

/* Colored ambient BG */
#videoPage.peace-bg  { background: radial-gradient(ellipse at center, #021a0e 0%, #000 70%); }
#videoPage.naughty-bg{ background: radial-gradient(ellipse at center, #1a0202 0%, #000 70%); }

/* Fullscreen video */
#videoPage video {
  width:100vw; height:100vh;
  object-fit:contain;
  display:block;
  position:relative; z-index:110;
}

/* Top overlay bar */
#videoPage .vp-header {
  position:absolute; top:0; left:0; right:0; z-index:120;
  padding:18px 28px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
}

#videoPage .vp-title {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:clamp(14px,2.5vw,20px); font-weight:700; letter-spacing:0.06em;
}
#videoPage.peace-bg  .vp-title { color:#00e88a; text-shadow:0 0 20px rgba(0,232,138,0.7); }
#videoPage.naughty-bg .vp-title{ color:#ff5252; text-shadow:0 0 20px rgba(255,82,82,0.7); }

/* Back button */
.back-btn {
  font-family:'Cormorant Garamond',serif;
  font-size:13px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; cursor:pointer;
  border:1px solid rgba(255,255,255,0.25); border-radius:30px;
  padding:8px 20px; background:rgba(0,0,0,0.45);
  color:rgba(255,255,255,0.75);
  transition:all 0.25s ease;
  display:flex; align-items:center; gap:8px;
  backdrop-filter:blur(6px);
}
.back-btn:hover {
  background:rgba(255,255,255,0.12);
  color:#fff; border-color:rgba(255,255,255,0.5);
  transform:translateX(-3px);
}
.back-btn svg { width:14px; height:14px; }

/* Bottom overlay bar */
#videoPage .vp-footer {
  position:absolute; bottom:0; left:0; right:0; z-index:120;
  padding:18px 28px 22px;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}

#videoPage .vp-badge {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:11px; letter-spacing:0.25em; color:rgba(240,192,96,0.35);
}

/* Glow border on video */
#videoPage.peace-bg::before {
  content:''; position:absolute; inset:0; z-index:105; pointer-events:none;
  box-shadow:inset 0 0 80px rgba(0,232,138,0.08);
}
#videoPage.naughty-bg::before {
  content:''; position:absolute; inset:0; z-index:105; pointer-events:none;
  box-shadow:inset 0 0 80px rgba(255,82,82,0.08);
}

/* ══════════════════════════════
   SHARED ANIMS
══════════════════════════════ */
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-22px); }
  to   { opacity:1; transform:translateY(0); }
}

@media(max-width:520px){
  .btn-row{gap:16px;}
  .btn{width:166px;height:172px;}
  .btn-emoji{font-size:38px;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="runes"></div>

<!-- ══ MAIN PAGE ══ -->
<div id="mainPage">
  <span class="badge">✦ &nbsp; aslamualaikum &nbsp; ✦</span>

  <div class="title-wrap">
    <span class="title-frak">Eid Mubarak</span>
    <span class="title-sub">— Stay Blessed, Stay Humble and Keep Shining —</span>
  </div>

  <svg class="orn" viewBox="0 0 380 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="12" x2="138" y2="12" stroke="#f0c060" stroke-width="0.7"/>
    <line x1="242" y1="12" x2="380" y2="12" stroke="#f0c060" stroke-width="0.7"/>
    <circle cx="152" cy="12" r="2" fill="#f0c060"/>
    <polygon points="168,4 178,12 168,20 158,12" fill="none" stroke="#f0c060" stroke-width="1.2"/>
    <circle cx="190" cy="12" r="5.5" fill="none" stroke="#f0c060" stroke-width="1.2"/>
    <text x="190" y="16" text-anchor="middle" font-size="8" fill="#f0c060" font-family="serif">✦</text>
    <polygon points="212,4 222,12 212,20 202,12" fill="none" stroke="#f0c060" stroke-width="1.2"/>
    <circle cx="228" cy="12" r="2" fill="#f0c060"/>
    <circle cx="145" cy="12" r="1.3" fill="#f0c060" opacity=".45"/>
    <circle cx="235" cy="12" r="1.3" fill="#f0c060" opacity=".45"/>
  </svg>

  <p class="question">What kind of Sami Blessing do you want to receive?</p>

  <div class="btn-row">
    <button class="btn peace" onclick="openVideo('peace')">
      <div class="btn-particles" id="pp"></div>
      <div class="btn-inner">
        <span class="btn-number"></span>
        <span class="btn-emoji">🤵🏻</span>
        <span class="btn-label">Peaceful Sami</span>
      </div>
    </button>
    <button class="btn naughty" onclick="openVideo('naughty')">
      <div class="btn-particles" id="np"></div>
      <div class="btn-inner">
        <span class="btn-number"></span>
        <span class="btn-emoji">😈</span>
        <span class="btn-label">Naughty Sami</span>
      </div>
    </button>
  </div>

  <p class="footer">✦ &nbsp; Designed By Himayet Kawsar &nbsp; ✦</p>
</div>

<!-- ══ FULLSCREEN VIDEO PAGE ══ -->
<div id="videoPage">
  <div class="flash" id="flashEl"></div>

  <div class="vp-header">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Back
    </button>
    <span class="vp-title" id="vpTitle"></span>
    <div style="width:80px"></div>
  </div>

  <video id="mainVideo" controls autoplay>
    <source id="videoSrc" src="" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="vp-footer">
    <span class="vp-badge">✦ &nbsp; Sami's Blessings &nbsp; ✦</span>
  </div>
</div>

<script>
/* ── STARFIELD + NEBULA ── */
(function(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  function resize(){
    W=c.width=window.innerWidth; H=c.height=window.innerHeight;
    stars=[];
    for(let i=0;i<280;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.5+0.15,
      phase:Math.random()*Math.PI*2,
      speed:Math.random()*0.007+0.001,
      hue:Math.random()<0.65?45:(Math.random()<0.5?160:0),
    });
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    [{x:W*0.1,y:H*0.2,r:W*0.38,c:'rgba(110,30,190,0.07)'},
     {x:W*0.88,y:H*0.75,r:W*0.32,c:'rgba(20,170,90,0.06)'},
     {x:W*0.55,y:H*0.5,r:W*0.42,c:'rgba(200,90,10,0.05)'},
     {x:W*0.3,y:H*0.85,r:W*0.25,c:'rgba(30,80,180,0.055)'}
    ].forEach(n=>{
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,n.c); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });
    stars.forEach(s=>{
      const a=0.15+0.85*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
      g.addColorStop(0,`hsla(${s.hue},80%,90%,${a*0.6})`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},60%,97%,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); requestAnimationFrame(draw);
})();

/* ── FLOATING RUNES ── */
(function(){
  const syms=['✦','✧','⋆','◈','❋','❊','⌘','✺','✹','⚜','✴','☽','☿'];
  const con=document.getElementById('runes');
  for(let i=0;i<20;i++){
    const el=document.createElement('div');
    el.className='rune';
    el.textContent=syms[Math.floor(Math.random()*syms.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.fontSize=(Math.random()*22+10)+'px';
    el.style.animationDuration=(Math.random()*32+18)+'s';
    el.style.animationDelay=(Math.random()*28)+'s';
    con.appendChild(el);
  }
})();

/* ── OPEN VIDEO PAGE ── */
function openVideo(type) {
  // Particle burst on button
  const isPeace = type === 'peace';
  burst(isPeace ? 'pp' : 'np', isPeace ? '#00e88a' : '#ff5252');

  // Short delay for burst effect, then transition
  setTimeout(() => {
    const vp = document.getElementById('videoPage');
    const main = document.getElementById('mainPage');
    const video = document.getElementById('mainVideo');
    const src = document.getElementById('videoSrc');
    const title = document.getElementById('vpTitle');
    const flash = document.getElementById('flashEl');

    // Set video source & title
    src.src = isPeace ? 'peaceful.mp4' : 'naughty.mp4';
    title.textContent = isPeace ? '🌸  Peaceful Sami\'s Blessing' : '😈  Naughty Sami\'s Blessing';

    // Style the video page
    vp.className = isPeace ? 'peace-bg' : 'naughty-bg';

    // Reload video with new src
    video.load();

    // Re-attach flash for animation
    flash.style.background = isPeace
      ? 'radial-gradient(ellipse at center, rgba(0,232,138,0.18) 0%, transparent 70%)'
      : 'radial-gradient(ellipse at center, rgba(255,82,82,0.18) 0%, transparent 70%)';
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = 'flashIn 0.8s ease forwards';

    // Exit main page
    main.classList.add('exit');

    // Show video page
    vp.classList.add('active');

    // Autoplay
    setTimeout(() => video.play().catch(()=>{}), 400);

  }, 150);
}

/* ── BACK TO MAIN ── */
function goBack() {
  const vp = document.getElementById('videoPage');
  const main = document.getElementById('mainPage');
  const video = document.getElementById('mainVideo');

  // Pause video
  video.pause();

  // Fade out video page
  vp.style.opacity = '0';
  setTimeout(() => {
    vp.classList.remove('active');
    vp.style.opacity = '';
    vp.className = '';
  }, 650);

  // Restore main page
  main.classList.remove('exit');
}

/* ── PARTICLE BURST ── */
function burst(id, color){
  const c=document.getElementById(id); if(!c) return;
  c.innerHTML='';
  for(let i=0;i<22;i++){
    const p=document.createElement('span');
    const angle=(i/22)*360;
    const dist=55+Math.random()*65;
    const size=2.5+Math.random()*5;
    const rad=angle*Math.PI/180;
    const tx=Math.cos(rad)*dist, ty=Math.sin(rad)*dist;
    p.style.cssText=`position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:${color};left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px ${color};`;
    p.animate([
      {transform:`translate(-50%,-50%) scale(1)`,opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}
    ],{duration:700+Math.random()*300,easing:'cubic-bezier(.17,.67,.83,.67)',fill:'forwards',delay:Math.random()*100});
    c.appendChild(p);
  }
}
</script>
</body>
</html>
