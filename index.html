<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Eid Mubarak 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5D76E;
    --gold-dark: #A8860A;
    --teal: #0D6E6E;
    --teal-light: #14A5A5;
    --deep: #0A1628;
    --deep2: #071020;
    --cream: #FDF6E3;
    --rose: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ===== STARS BACKGROUND ===== */
  .stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) infinite ease-in-out;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  /* ===== MOSQUE SILHOUETTE ===== */
  .mosque-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.18;
  }

  /* ===== FLOATING LANTERNS ===== */
  .lantern {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: floatLantern linear infinite;
    opacity: 0;
  }

  @keyframes floatLantern {
    0% { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-20vh) rotate(5deg); opacity: 0; }
  }

  /* ===== CRESCENT MOON ===== */
  .moon-container {
    position: fixed;
    top: 30px;
    right: 60px;
    z-index: 3;
    pointer-events: none;
    animation: moonGlow 3s infinite ease-in-out;
    filter: drop-shadow(0 0 18px rgba(212,175,55,0.7)) drop-shadow(0 0 50px rgba(212,175,55,0.3));
  }

  .moon-container svg {
    width: 80px;
    height: 80px;
  }

  @keyframes moonGlow {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(212,175,55,0.7)) drop-shadow(0 0 50px rgba(212,175,55,0.25)); }
    50% { filter: drop-shadow(0 0 32px rgba(212,175,55,1)) drop-shadow(0 0 90px rgba(212,175,55,0.5)); }
  }

  /* ===== PAGES ===== */
  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 16px 40px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .page.hidden {
    display: none;
  }

  /* ===== SEARCH PAGE ===== */
  #searchPage {
    flex-direction: column;
    text-align: center;
  }

  .eid-header {
    margin-bottom: 10px;
    animation: fadeDown 1s ease both;
  }

  .arabic-text {
    font-family: 'Amiri', serif;
    font-size: clamp(28px, 6vw, 56px);
    color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(212,175,55,0.5);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .eid-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 12vw, 80px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark), var(--gold-light));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s infinite, fadeDown 1s ease 0.2s both;
    line-height: 1;
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .eid-subtitle {
    font-size: clamp(9px, 3vw, 15px);
    color: rgba(245,215,110,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeDown 1s ease 0.4s both;
    margin-bottom: 28px;
  }

  /* ORNAMENTAL DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px auto;
    width: fit-content;
    animation: fadeUp 1s ease 0.6s both;
  }

  .divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .divider-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* SEARCH CARD */
  .search-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 24px;
    padding: 36px 24px;
    max-width: 480px;
    width: 100%;
    animation: fadeUp 1s ease 0.8s both;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }

  .search-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.05), transparent 60%);
    pointer-events: none;
  }

  .card-prompt {
    font-size: 14px;
    color: rgba(245,215,110,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .input-wrapper {
    position: relative;
    margin-bottom: 24px;
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 14px;
    padding: 18px 24px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    caret-color: var(--gold);
  }

  .name-input::placeholder {
    color: rgba(255,255,255,0.2);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
  }

  .name-input:focus {
    border-color: rgba(212,175,55,0.7);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 4px rgba(212,175,55,0.1), 0 0 20px rgba(212,175,55,0.2);
  }

  .search-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--deep);
    cursor: pointer;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(212,175,55,0.3);
  }

  .search-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .search-btn:hover::before {
    transform: translateX(100%);
  }

  .search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(212,175,55,0.45);
  }

  .search-btn:active {
    transform: translateY(0);
  }

  .search-btn-icon {
    margin-right: 10px;
    font-size: 20px;
  }

  .error-msg {
    color: #FF8A80;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  .hint-text {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  /* ===== SALAMI BUTTON ===== */
  .salami-btn-wrapper {
    margin-top: 20px;
    animation: fadeUp 1s ease 1s both;
  }

  .salami-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(13,110,110,0.18);
    border: 1px solid rgba(20,165,165,0.45);
    border-radius: 50px;
    padding: 12px 28px;
    color: var(--teal-light);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }

  .salami-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(20,165,165,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .salami-btn:hover::before {
    transform: translateX(100%);
  }

  .salami-btn:hover {
    border-color: var(--teal-light);
    color: #fff;
    background: rgba(13,110,110,0.35);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(13,110,110,0.3);
  }

  .salami-btn:active { transform: translateY(0); }

  .salami-pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal-light);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }

  /* ===== MESSAGE PAGE ===== */
  #messagePage {
    flex-direction: column;
    align-items: center;
  }

  .msg-container {
    max-width: 720px;
    width: 100%;
    text-align: center;
    animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg-top-deco {
    font-size: 48px;
    margin-bottom: 16px;
    animation: bounceIn 1s ease 0.3s both;
  }

  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .msg-arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(20px, 4vw, 36px);
    color: var(--gold);
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(212,175,55,0.4);
  }

  .msg-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 13vw, 88px);
    font-weight: 700;
    background: linear-gradient(135deg, #FFF5CC, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
    filter: drop-shadow(0 4px 20px rgba(212,175,55,0.3));
    animation: shimmer 3s infinite;
    background-size: 200% 200%;
  }

  .msg-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 28px;
    padding: 48px 40px;
    margin: 32px 0;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .msg-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 0% 0%, rgba(212,175,55,0.08), transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(13,110,110,0.08), transparent 50%);
    pointer-events: none;
  }

  .corner-ornament {
    position: absolute;
    font-size: 28px;
    opacity: 0.25;
    color: var(--gold);
  }
  .corner-ornament.tl { top: 16px; left: 20px; }
  .corner-ornament.tr { top: 16px; right: 20px; transform: scaleX(-1); }
  .corner-ornament.bl { bottom: 16px; left: 20px; transform: scaleY(-1); }
  .corner-ornament.br { bottom: 16px; right: 20px; transform: scale(-1); }

  .msg-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(15px, 3.5vw, 22px);
    color: rgba(253,246,227,0.92);
    line-height: 1.9;
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  .msg-highlight {
    color: var(--gold-light);
    font-style: normal;
    font-weight: 700;
  }

  .msg-signature {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(212,175,55,0.15);
    font-size: 13px;
    color: rgba(245,215,110,0.5);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .msg-footer-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 24px;
    font-size: 22px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    background: transparent;
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 50px;
    padding: 12px 28px;
    color: rgba(245,215,110,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .back-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212,175,55,0.08);
    transform: translateY(-2px);
  }

  /* ===== SALAMI PAGE ===== */
  #salamiPage {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .salami-container {
    max-width: 480px;
    width: 100%;
    animation: scaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .salami-header-emoji {
    color: gold;
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
    
  }

  .salami-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 7vw, 44px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--teal-light));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s infinite;
    margin-bottom: 6px;
  }

  .salami-subtitle {
    font-family: 'Amiri', serif;
    font-size: clamp(16px, 3.5vw, 24px);
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0.85;
  }

  .salami-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(20,165,165,0.3);
    border-radius: 24px;
    padding: 36px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }

  .salami-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(20,165,165,0.07), transparent 60%);
    pointer-events: none;
  }

  .salami-card-prompt {
    font-size: 13px;
    color: rgba(20,165,165,0.8);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .phone-input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .phone-prefix {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--teal-light);
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 700;
    pointer-events: none;
    z-index: 1;
  }

  .phone-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(20,165,165,0.35);
    border-radius: 14px;
    padding: 18px 18px 18px 52px;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--cream);
    outline: none;
    text-align: left;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    caret-color: var(--teal-light);
  }

  .phone-input::placeholder {
    color: rgba(255,255,255,0.2);
    font-size: 15px;
    letter-spacing: 1px;
    font-weight: 400;
  }

  .phone-input:focus {
    border-color: rgba(20,165,165,0.7);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 4px rgba(20,165,165,0.1), 0 0 20px rgba(20,165,165,0.15);
  }

  .continue-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(13,110,110,0.4);
  }

  .continue-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .continue-btn:hover::before { transform: translateX(100%); }
  .continue-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(13,110,110,0.55);
  }
  .continue-btn:active { transform: translateY(0); }

  .phone-error-msg {
    color: #FF8A80;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
  }

  /* ===== VIDEO PAGE ===== */
  #videoPage {
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
  }

  .video-container {
    max-width: 700px;
    width: 100%;
    text-align: center;
    animation: scaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .video-greeting {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--gold-light);
    margin-bottom: 6px;
    font-style: italic;
  }

  .video-name-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 9vw, 60px);
    font-weight: 700;
    background: linear-gradient(135deg, #FFF5CC, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s infinite;
    background-size: 200% 200%;
    margin-bottom: 20px;
    line-height: 1.1;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.3);
    box-shadow: 0 24px 70px rgba(0,0,0,0.6), 0 0 40px rgba(212,175,55,0.1);
    background: #000;
  }

  .video-wrapper video {
    width: 100%;
    display: block;
    border-radius: 20px;
  }

  .video-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    background: transparent;
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 50px;
    padding: 12px 28px;
    color: rgba(245,215,110,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }
  .video-back-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212,175,55,0.08);
    transform: translateY(-2px);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== PARTICLE BURST on message page ===== */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 100;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* ===== RESPONSIVE / MOBILE ===== */
  @media (max-width: 480px) {
    .moon-container svg { width: 55px; height: 55px; }
    .moon-container { top: 16px; right: 16px; }

    .page { padding: 70px 14px 36px; }

    .eid-header { margin-bottom: 6px; }

    .search-card { padding: 28px 18px; border-radius: 20px; }

    .name-input { font-size: 18px; padding: 15px 18px; }
    .search-btn { font-size: 16px; padding: 15px; }

    .card-prompt { font-size: 12px; }
    .hint-text { font-size: 11px; }

    .msg-card { padding: 28px 18px; border-radius: 20px; }
    .msg-text { font-size: 15px; line-height: 1.8; }

  // ===== SEARCH LOGIC =====
  function searchName() {
    const input = document.getElementById('nameInput').value.trim();
    const errorEl = document.getElementById('errorMsg');
    const key = input.toLowerCase().replace(/\s+/g, '');

    if (!input) {
      showError("Please enter your name 🌙");
      return;
    }

    if (messages[key]) {
      errorEl.textContent = '';
      showMessagePage(messages[key]);
    } else {
      showError("Hmm, that name isn't on the list. Try again! 💫");
      shakeInput();
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.opacity = '1';
  }

  function shakeInput() {
    const input = document.getElementById('nameInput');
    input.style.animation = 'none';
    input.style.borderColor = '#FF8A80';
    setTimeout(() => { input.style.borderColor = ''; }, 1500);
  }

  function showMessagePage(data) {
    document.getElementById('searchPage').classList.add('hidden');
    const msgPage = document.getElementById('messagePage');
    msgPage.classList.remove('hidden');
    document.getElementById('msgName').textContent = data.display;
    document.getElementById('msgText').innerHTML = data.msg;
    launchConfetti();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack() {
    document.getElementById('messagePage').classList.add('hidden');
    document.getElementById('searchPage').classList.remove('hidden');
    document.getElementById('nameInput').value = '';
    document.getElementById('errorMsg').textContent = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchName();
  });

  // ===== SALAMI PAGE =====
  function goToSalamiPage() {
    document.getElementById('searchPage').classList.add('hidden');
    document.getElementById('salamiPage').classList.remove('hidden');

  function goBackFromSalami() {

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Only allow digits in phone input
  document.getElementById('phoneInput').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '');
  });

  document.getElementById('phoneInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') continueToVideo();
  });

  function continueToVideo() {
    const phone = document.getElementById('phoneInput').value.trim();
    const errEl = document.getElementById('phoneErrorMsg');

    // Validate: 11 digits, starts with 01 (Bangladeshi mobile)
    const bdPhoneRegex = /^01[3-9]\d{8}$/;

    if (!phone) {
      errEl.textContent = 'মোবাইল নম্বর দিন 📱';
      return;
    }
    if (phone.length !== 11 || !bdPhoneRegex.test(phone)) {
      errEl.textContent = 'সঠিক ১১ সংখ্যার বাংলাদেশি নম্বর দিন (01XXXXXXXXX)';
      shakePhoneInput();
      return;
    }

    errEl.textContent = '';
    showVideoPage(phone);
  }

  function shakePhoneInput() {
    const input = document.getElementById('phoneInput');
    input.style.borderColor = '#FF8A80';
    setTimeout(() => { input.style.borderColor = ''; }, 1500);
  }

  function showVideoPage(phone) {
    document.getElementById('salamiPage').classList.add('hidden');
    document.getElementById('videoPage').classList.remove('hidden');

    // Show masked phone number as greeting
    const masked = phone.slice(0, 4) + '***' + phone.slice(7);
    document.getElementById('videoPhoneDisplay').textContent = masked;

    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Auto-play the video
    const video = document.getElementById('salamiVideo');
    video.currentTime = 0;

    // Try to play with sound; if blocked by browser policy, play muted
    video.muted = false;
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // Autoplay with sound blocked — play muted instead
        video.muted = true;
        video.play().catch(() => {});
      });
    }

    launchConfetti();
  }

  function goBackFromVideo() {
    const video = document.getElementById('salamiVideo');
    video.pause();
    video.currentTime = 0;
    document.getElementById('videoPage').classList.add('hidden');
    document.getElementById('salamiPage').classList.remove('hidden');
    document.getElementById('phoneInput').value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== CONFETTI =====
  function launchConfetti() {
    const colors = ['#D4AF37', '#F5D76E', '#0D6E6E', '#14A5A5', '#FFF8DC', '#C0392B', '#F39C12'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 8 + 4) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (Math.random() * 3 + 2) + 's';
        piece.style.animationDelay = '0s';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
      }, i * 30);
    }
  }

  // ===== GENERATE STARS =====
  const starsBg = document.getElementById('starsBg');
  for (let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${Math.random() * 4 + 2}s;
      --op: ${Math.random() * 0.7 + 0.3};
      animation-delay: ${Math.random() * 5}s;
    `;
    starsBg.appendChild(star);
  }

  // ===== FLOATING LANTERNS =====
  function createLantern() {
    const lantern = document.createElement('div');
    lantern.className = 'lantern';
    const lanternSVG = `<svg width="28" height="44" viewBox="0 0 28 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="14" y1="0" x2="14" y2="6" stroke="#D4AF37" stroke-width="1.5"/>
      <ellipse cx="14" cy="8" rx="6" ry="3" fill="#D4AF37" opacity="0.8"/>
      <path d="M4 12 Q2 24 4 34 Q8 42 14 43 Q20 42 24 34 Q26 24 24 12 Z" fill="url(#lg)" opacity="0.9"/>
      <path d="M4 12 Q8 10 14 11 Q20 10 24 12" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
      <path d="M4 34 Q8 36 14 37 Q20 36 24 34" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
      <defs>
        <linearGradient id="lg" x1="4" y1="12" x2="24" y2="43" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#F5D76E"/>
          <stop offset="50%" stop-color="#E8A020"/>
          <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
      </defs>
    </svg>`;
    lantern.innerHTML = lanternSVG;
    lantern.style.left = (Math.random() * 90 + 5) + 'vw';
    const dur = Math.random() * 15 + 12;
    lantern.style.animationDuration = dur + 's';
    lantern.style.animationDelay = (Math.random() * 20) + 's';
    document.body.appendChild(lantern);
    setTimeout(() => lantern.remove(), (dur + 25) * 1000);
  }

  for (let i = 0; i < 6; i++) createLantern();
  setInterval(createLantern, 4000);
</script>
</body>
</html>
